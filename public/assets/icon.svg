<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="44%">
      <stop offset="0%" stop-color="#281F14" stop-opacity="0.40" />
      <stop offset="100%" stop-color="#060503" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="35%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.40" />
    </radialGradient>
    <linearGradient id="cellTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#30281E" />
      <stop offset="100%" stop-color="#262018" />
    </linearGradient>
    <linearGradient id="cellBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#201A14" />
      <stop offset="100%" stop-color="#18140E" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="#060503" />
  <circle cx="256" cy="256" r="226" fill="url(#glow)" />
  <circle cx="256" cy="256" r="369" fill="url(#vignette)" />
  <!-- G cell -->
  <g>
    <rect x="50" y="138" width="197" height="236" rx="20" fill="url(#cellBottom)" stroke="#3C3022" stroke-width="2.5" />
    <rect x="50" y="138" width="197" height="118" rx="20" fill="url(#cellTop)" />
    <rect x="50" y="246" width="197" height="10" rx="0" fill="url(#cellTop)" />
    <!-- Hinge -->
    <rect x="52" y="252" width="193" height="5" fill="#020201" opacity="0.95" />
    <rect x="52" y="257" width="193" height="2" fill="#584834" opacity="0.50" />
    <rect x="52" y="250" width="193" height="2" fill="#000" opacity="0.20" />
  </g>
  <!-- O cell -->
  <g>
    <rect x="265" y="138" width="197" height="236" rx="20" fill="url(#cellBottom)" stroke="#3C3022" stroke-width="2.5" />
    <rect x="265" y="138" width="197" height="118" rx="20" fill="url(#cellTop)" />
    <rect x="265" y="246" width="197" height="10" rx="0" fill="url(#cellTop)" />
    <!-- Hinge -->
    <rect x="267" y="252" width="193" height="5" fill="#020201" opacity="0.95" />
    <rect x="267" y="257" width="193" height="2" fill="#584834" opacity="0.50" />
    <rect x="267" y="250" width="193" height="2" fill="#000" opacity="0.20" />
  </g>
  <!-- Letters -->
  <text x="148" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="200" font-weight="700" fill="#F8F6F2">G</text>
  <text x="364" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="200" font-weight="700" fill="#F8F6F2">O</text>
</svg>
