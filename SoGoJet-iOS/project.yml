name: SoGoJet
options:
  bundleIdPrefix: com.sogojet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: SoGoJet
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "2MU4PC84GZ"
packages:
  stripe-ios:
    url: https://github.com/stripe/stripe-ios.git
    from: "23.0.0"
schemes:
  SoGoJet:
    build:
      targets:
        SoGoJet: all
    run:
      config: Debug
targets:
  SoGoJet:
    type: application
    platform: iOS
    sources:
      - path: SoGoJet
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: stripe-ios
        product: StripePaymentSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sogojet.app
        INFOPLIST_FILE: SoGoJet/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.travel"
