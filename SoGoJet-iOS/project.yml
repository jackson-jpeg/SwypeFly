name: SoGoJet
options:
  bundleIdPrefix: com.sogojet
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: SoGoJet
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "2MU4PC84GZ"
    # Xcode recommended settings
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: true
    ENABLE_MODULE_VERIFIER: true
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    LOCALIZATION_PREFERS_STRING_CATALOGS: true
    SWIFT_EMIT_LOC_STRINGS: true
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: true
packages:
  stripe-ios:
    url: https://github.com/stripe/stripe-ios.git
    from: "24.0.0"
schemes:
  SoGoJet:
    build:
      targets:
        SoGoJet: all
        SoGoJetWidgetExtension: all
    run:
      config: Debug
targets:
  SoGoJet:
    type: application
    platform: iOS
    sources:
      - path: SoGoJet
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: stripe-ios
        product: StripePaymentSheet
      - target: SoGoJetWidgetExtension
    entitlements:
      path: SoGoJet/SoGoJet.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sogojet.app
        INFOPLIST_FILE: SoGoJet/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.travel"
        CODE_SIGN_ENTITLEMENTS: SoGoJet/SoGoJet.entitlements

  SoGoJetWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SoGoJetWidget
        excludes:
          - "**/.DS_Store"
      - path: SoGoJet/Models/FlightSearchActivity.swift
    entitlements:
      path: SoGoJetWidget/SoGoJetWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sogojet.app.Widget
        INFOPLIST_FILE: SoGoJetWidget/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: SoGoJetWidget/SoGoJetWidget.entitlements
        DEAD_CODE_STRIPPING: true
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
