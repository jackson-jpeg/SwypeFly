name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --coverage --passWithNoTests --testPathIgnorePatterns='/node_modules/' --testPathIgnorePatterns='__mocks__' --testPathIgnorePatterns='api/(feed|swipe|destination|saved|alerts|og|search|prices|images|refresh)'
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

      - name: Build web
        run: npx expo export --platform web

      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dist/ | cut -f1)
          echo "Total dist size: $((TOTAL / 1024 / 1024))MB ($TOTAL bytes)"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "::warning::Bundle size exceeds 5MB threshold"
          fi
